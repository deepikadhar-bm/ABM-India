name: Playwright Tests

on:

  workflow_dispatch:
    inputs:

      environment:
        description: Environment
        required: true
        type: choice
        options:
          - qa
          - dev
          - staging
          - prod

      runBy:
        description: Execute By
        required: true
        type: choice
        options:
          - Module
          - SpecFile
          - TestCase
          - Tag

      module:
        description: "Module Name (Example: growSmart)"
        required: false
        type: string
        default: ""

      specFile:
        description: "Spec File Path (Example: test/growSmart/simpletestcase.spec.ts)"
        required: false
        type: string
        default: ""

      testCase:
        description: "Test Case Name (Example: REG_TS_PO_TC01)"
        required: false
        type: string
        default: ""

      tag:
        description: Tag
        required: false
        type: choice
        options:
          - "NONE"
          - "@smoke"
          - "@regression"
          - "@sanity"
          - "@p1"
          - "@p2"
        default: "NONE"

      workers:
        description: Workers
        required: true
        type: choice
        options:
          - "1"
          - "2"
          - "4"
        default: "2"

      retries:
        description: Retries
        required: true
        type: choice
        options:
          - "0"
          - "1"
          - "2"
        default: "1"

  schedule:
    - cron: "0 0 * * *"

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      RUN_ENVIRONMENT: ${{ github.event_name == 'schedule' && 'qa'          || inputs.environment }}
      RUN_BY:          ${{ github.event_name == 'schedule' && 'Tag'         || inputs.runBy       }}
      RUN_TAG:         ${{ github.event_name == 'schedule' && '@regression' || inputs.tag         }}
      RUN_MODULE:      ${{ github.event_name == 'schedule' && ''            || inputs.module      }}
      RUN_SPEC:        ${{ github.event_name == 'schedule' && ''            || inputs.specFile    }}
      RUN_TESTCASE:    ${{ github.event_name == 'schedule' && ''            || inputs.testCase    }}
      RUN_WORKERS:     ${{ github.event_name == 'schedule' && '2'           || inputs.workers     }}
      RUN_RETRIES:     ${{ github.event_name == 'schedule' && '1'           || inputs.retries     }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npm run pw:install

      - name: Install system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Type Check
        run: npm run typecheck

      - name: Show Execution Details
        run: |
          echo "Trigger     : ${{ github.event_name }}"
          echo "Environment : $RUN_ENVIRONMENT"
          echo "Run By      : $RUN_BY"
          echo "Module      : $RUN_MODULE"
          echo "Spec File   : $RUN_SPEC"
          echo "Test Case   : $RUN_TESTCASE"
          echo "Tag         : $RUN_TAG"
          echo "Workers     : $RUN_WORKERS"
          echo "Retries     : $RUN_RETRIES"

      - name: Run Module
        id: run_module
        if: env.RUN_BY == 'Module'
        run: |
          npx playwright test "test/$RUN_MODULE" \
            --workers=$RUN_WORKERS \
            --retries=$RUN_RETRIES \
            --reporter=list,html,junit
        env:
          CI:             true
          ENVIRONMENT:    ${{ env.RUN_ENVIRONMENT }}
          TIMEOUT_ACTION: 30000
          LOG_LEVEL:      DEBUG
          FORCE_COLOR:    1

      - name: Run Spec File
        id: run_spec
        if: env.RUN_BY == 'SpecFile'
        run: |
          npx playwright test "$RUN_SPEC" \
            --workers=$RUN_WORKERS \
            --retries=$RUN_RETRIES \
            --reporter=list,html,junit
        env:
          CI:             true
          ENVIRONMENT:    ${{ env.RUN_ENVIRONMENT }}
          TIMEOUT_ACTION: 30000
          LOG_LEVEL:      DEBUG
          FORCE_COLOR:    1

      - name: Run Test Case
        id: run_testcase
        if: env.RUN_BY == 'TestCase'
        run: |
          npx playwright test \
            --grep "$RUN_TESTCASE" \
            --workers=$RUN_WORKERS \
            --retries=$RUN_RETRIES \
            --reporter=list,html,junit
        env:
          CI:             true
          ENVIRONMENT:    ${{ env.RUN_ENVIRONMENT }}
          TIMEOUT_ACTION: 30000
          LOG_LEVEL:      DEBUG
          FORCE_COLOR:    1

      - name: Run Tag
        id: run_tag
        if: env.RUN_BY == 'Tag'
        run: |
          npx playwright test \
            --grep "$RUN_TAG" \
            --workers=$RUN_WORKERS \
            --retries=$RUN_RETRIES \
            --reporter=list,html,junit
        env:
          CI:             true
          ENVIRONMENT:    ${{ env.RUN_ENVIRONMENT }}
          TIMEOUT_ACTION: 30000
          LOG_LEVEL:      DEBUG
          FORCE_COLOR:    1

      - name: Resolve run outcome
        if: always()
        run: |
          OUTCOME="${{ steps.run_module.outcome }}${{ steps.run_spec.outcome }}${{ steps.run_testcase.outcome }}${{ steps.run_tag.outcome }}"
          if echo "$OUTCOME" | grep -q "failure"; then
            echo "RUN_OUTCOME=failure" >> $GITHUB_ENV
          elif echo "$OUTCOME" | grep -q "success"; then
            echo "RUN_OUTCOME=success" >> $GITHUB_ENV
          else
            echo "RUN_OUTCOME=skipped" >> $GITHUB_ENV
          fi

      - name: Parse test results
        if: always()
        run: |
          JUNIT_FILE="reports/results.xml"
          if [ -f "$JUNIT_FILE" ]; then
            TOTAL=$(grep -oP 'tests="\K[0-9]+' "$JUNIT_FILE" | head -1 || echo "0")
            FAILED=$(grep -oP 'errors="\K[0-9]+' "$JUNIT_FILE" | head -1 || echo "0")
            SKIPPED=$(grep -oP 'skipped="\K[0-9]+' "$JUNIT_FILE" | head -1 || echo "0")
            PASSED=$(( TOTAL - FAILED - SKIPPED ))
          else
            TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0
          fi
          echo "TC_TOTAL=$TOTAL"     >> $GITHUB_ENV
          echo "TC_PASSED=$PASSED"   >> $GITHUB_ENV
          echo "TC_FAILED=$FAILED"   >> $GITHUB_ENV
          echo "TC_SKIPPED=$SKIPPED" >> $GITHUB_ENV

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ env.RUN_ENVIRONMENT }}-run${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
            allure-results/
            reports/
            logs/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          if [ "$RUN_OUTCOME" = "success" ]; then
            STATUS="✅ Passed"
          else
            STATUS="❌ Failed"
          fi
          case "$RUN_BY" in
            Module)   TARGET="Module: $RUN_MODULE" ;;
            SpecFile) TARGET="File: $RUN_SPEC" ;;
            TestCase) TARGET="Test: $RUN_TESTCASE" ;;
            Tag)      TARGET="Tag: $RUN_TAG" ;;
            *)        TARGET="-" ;;
          esac
          {
            echo "## $STATUS — Playwright Tests"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Status | $STATUS |"
            echo "| Environment | $RUN_ENVIRONMENT |"
            echo "| Execute By | $RUN_BY |"
            echo "| Target | $TARGET |"
            echo "| Workers | $RUN_WORKERS |"
            echo "| Retries | $RUN_RETRIES |"
            echo "| Run Number | ${{ github.run_number }} |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Actor | ${{ github.actor }} |"
            echo ""
            echo "## 📊 Test Results"
            echo ""
            echo "| Result | Count |"
            echo "|---|---|"
            echo "| 🧪 Total | $TC_TOTAL |"
            echo "| ✅ Passed | $TC_PASSED |"
            echo "| ❌ Failed | $TC_FAILED |"
            echo "| ⏭️ Skipped | $TC_SKIPPED |"
            echo ""
            echo "🔗 [View full run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify pass
        if: env.RUN_OUTCOME == 'success'
        run: |
          echo "::notice title=✅ Playwright PASSED on $RUN_ENVIRONMENT::Run #${{ github.run_number }} | $RUN_BY | Total: $TC_TOTAL | Passed: $TC_PASSED | Failed: $TC_FAILED | Actor: ${{ github.actor }} | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Notify failure
        if: env.RUN_OUTCOME == 'failure'
        run: |
          echo "::error title=❌ Playwright FAILED on $RUN_ENVIRONMENT::Run #${{ github.run_number }} | $RUN_BY | Total: $TC_TOTAL | Passed: $TC_PASSED | Failed: $TC_FAILED | Actor: ${{ github.actor }} | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"