name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        options:
          - qa
          - dev
          - staging
          - prod
      tag:
        type: choice
        required: true
        options:
          - "@smoke"
          - "@regression"
          - "@sanity"
          - "@p1"
          - "@p2"
      workers:
        type: choice
        required: true
        options:
          - "1"
          - "2"
          - "4"
      retries:
        type: choice
        required: true
        options:
          - "0"
          - "1"
          - "2"

  schedule:
    - cron: "0 0 * * *"

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      RUN_ENVIRONMENT: ${{ github.event_name == 'schedule' && 'qa'          || inputs.environment }}
      RUN_TAG:         ${{ github.event_name == 'schedule' && '@regression'  || inputs.tag         }}
      RUN_WORKERS:     ${{ github.event_name == 'schedule' && '2'            || inputs.workers      }}
      RUN_RETRIES:     ${{ github.event_name == 'schedule' && '1'            || inputs.retries      }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npm run pw:install

      - name: Install system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - run: npm run typecheck

      - name: Run tests
        id: run_tests
        run: npx playwright test --grep "$RUN_TAG" --workers="$RUN_WORKERS" --retries="$RUN_RETRIES" --reporter=list,html,junit
        env:
          CI:             true
          ENVIRONMENT:    ${{ env.RUN_ENVIRONMENT }}
          TIMEOUT_ACTION: 30000
          LOG_LEVEL:      DEBUG
          FORCE_COLOR:    1

      - name: Strip @ from tag for artifact name
        if: always()
        run: echo "CLEAN_TAG=$(echo $RUN_TAG | sed 's/@//')" >> $GITHUB_ENV

      # ── Parse JUnit XML for test counts ──────────────────────────────────
      - name: Parse test results
        if: always()
        run: |
          JUNIT_FILE="reports/results.xml"
          if [ -f "$JUNIT_FILE" ]; then
            TOTAL=$(grep -oP 'tests="\K[0-9]+' "$JUNIT_FILE" | head -1 || echo "0")
            FAILED=$(grep -oP 'errors="\K[0-9]+' "$JUNIT_FILE" | head -1 || echo "0")
            SKIPPED=$(grep -oP 'skipped="\K[0-9]+' "$JUNIT_FILE" | head -1 || echo "0")
            PASSED=$(( TOTAL - FAILED - SKIPPED ))
          else
            TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0
          fi
          echo "TC_TOTAL=$TOTAL"     >> $GITHUB_ENV
          echo "TC_PASSED=$PASSED"   >> $GITHUB_ENV
          echo "TC_FAILED=$FAILED"   >> $GITHUB_ENV
          echo "TC_SKIPPED=$SKIPPED" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-${{ env.CLEAN_TAG }}-${{ env.RUN_ENVIRONMENT }}-run${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
            reports/
            allure-results/
            logs/
          retention-days: 30

      # ── Job summary — shown in GitHub UI and email ────────────────────────
      - name: Write job summary
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" == "success" ]; then
            STATUS="✅ Passed"
            STATUS_EMOJI="✅"
          else
            STATUS="❌ Failed"
            STATUS_EMOJI="❌"
          fi
          {
            echo "## $STATUS — Playwright Tests"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Status | $STATUS |"
            echo "| Tag | $RUN_TAG |"
            echo "| Environment | $RUN_ENVIRONMENT |"
            echo "| Workers | $RUN_WORKERS |"
            echo "| Retries | $RUN_RETRIES |"
            echo "| Run Number | ${{ github.run_number }} |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Actor | ${{ github.actor }} |"
            echo ""
            echo "## 📊 Test Results"
            echo ""
            echo "| Result | Count |"
            echo "|---|---|"
            echo "| 🧪 Total | $TC_TOTAL |"
            echo "| ✅ Passed | $TC_PASSED |"
            echo "| ❌ Failed | $TC_FAILED |"
            echo "| ⏭️ Skipped | $TC_SKIPPED |"
            echo ""
            echo "🔗 [View full run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Email on PASS ─────────────────────────────────────────────────────
      - name: Notify pass
        if: steps.run_tests.outcome == 'success'
        run: |
          echo "::notice title=✅ Playwright $RUN_TAG PASSED on $RUN_ENVIRONMENT::Run #${{ github.run_number }} | Total: $TC_TOTAL | Passed: $TC_PASSED | Failed: $TC_FAILED | Skipped: $TC_SKIPPED | Actor: ${{ github.actor }} | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # ── Email on FAILURE ──────────────────────────────────────────────────
      - name: Notify failure
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "::error title=❌ Playwright $RUN_TAG FAILED on $RUN_ENVIRONMENT::Run #${{ github.run_number }} | Total: $TC_TOTAL | Passed: $TC_PASSED | Failed: $TC_FAILED | Skipped: $TC_SKIPPED | Actor: ${{ github.actor }} | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"